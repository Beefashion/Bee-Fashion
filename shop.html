<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* SECTION */
        .shop-section {
            padding: 100px 8%;
            background: linear-gradient(135deg, #0f0f0f, #1a0010);
            color: #fff;
        }

        /* HEADER */
        .shop-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .shop-header h2 {
            font-size: 42px;
        }

        .shop-header span {
            color: #ff0080;
        }

        .shop-header p {
            color: #aaa;
        }

        /* OWNER */
        .owner {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        /* IMAGE */
        .owner-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ff0080;
        }

        .owner-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* INFO */
        .owner-info {
            max-width: 500px;
        }

        .owner-info h3 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .owner-info p {
            color: #ccc;
            margin-bottom: 10px;
        }

        .owner-social span {
            display: block;
            color: #aaa;
        }

        /* GALLERY */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* IMAGE BOX */
        .img-box {
            overflow: hidden;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
        }

        /* IMAGE */
        .img-box img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: .5s;
        }

        /* HOVER EFFECT */
        .img-box:hover img {
            transform: scale(1.1);
        }

        /* OVERLAY */
        .img-box::after {
            content: "View";
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .6);
            opacity: 0;
            transition: .4s;
        }

        .img-box:hover::after {
            opacity: 1;
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: .4s;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
        }

        .lightbox.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* SCROLL ANIMATION */
        .hidden {
            opacity: 0;
            transform: translateY(60px);
            transition: 1s;
        }

        .show {
            opacity: 1;
            transform: translateY(0);
        }

        /* MOBILE */
        @media(max-width:768px) {

            .shop-section {
                padding: 70px 5%;
            }

            .owner {
                flex-direction: column;
                text-align: center;
            }

            .gallery {
                grid-template-columns: 1fr 1fr;
            }

            .img-box img {
                height: 180px;
            }

        }
    </style>
</head>

<body>
    <section class="shop-section">

        <div class="shop-header">
            <h2>Our <span>Bee Fashion Shop</span></h2>
            <p>Explore our store, meet the owner & see our premium collection</p>
        </div>

        <!-- Owner -->
        <div class="owner hidden">
            <div class="owner-img">
                <img src="owner.jpeg" alt="">
            </div>

            <div class="owner-info">
                <h3>Ujjwal Azad</h3>
                <p>
                    Founder of Bee Fashion Shop. We deliver premium fashion
                    with modern style, comfort and confidence.
                </p>

                <div class="owner-social">
                    <span>📞 +91 9876543210</span>
                    <span>📍Kamranganj,Dehri, Bihar, India</span>
                </div>
            </div>
        </div>

        <!-- Gallery -->
        <div class="gallery">

            <div class="img-box hidden">
                <img src="WhatsApp Image 2026-05-03 at 5.36.09 PM (2).jpeg">
            </div>

            <div class="img-box hidden">
                <img src="WhatsApp Image 2026-05-03 at 5.36.09 PM (3).jpeg">
            </div>

            <div class="img-box hidden">
                <img src="WhatsApp Image 2026-05-03 at 5.36.09 PM (4).jpeg">
            </div>

            <div class="img-box hidden">
                <img src="WhatsApp Image 2026-05-03 at 5.36.09 PM (1).jpeg">
            </div>

        </div>

    </section>
    <script>
        /* SCROLL ANIMATION */
        const elements = document.querySelectorAll(".hidden");

        window.addEventListener("scroll", () => {
            elements.forEach(el => {
                const pos = el.getBoundingClientRect().top;
                if (pos < window.innerHeight - 100) {
                    el.classList.add("show");
                }
            });
        });

        /* LIGHTBOX */
        const images = document.querySelectorAll(".img-box img");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        images.forEach(img => {
            img.addEventListener("click", () => {
                lightbox.classList.add("show");
                lightboxImg.src = img.src;
            });
        });

        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("show");
        });
    </script>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <img id="lightbox-img">
    </div>
</body>

</html>
